<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Preview README blocks</title>
  <style>
    body {background:#070707;color:#fff;font-family: 'Space Mono', monospace; padding:24px; display:flex; justify-content:center}
    .wrapper{width:100%;max-width:920px;display:flex;flex-direction:column;gap:18px}
    img.block {width:100%;height:auto;display:block;border-radius:8px}
  </style>
</head>
<body>
  <div class="wrapper">
    <img class="block" src="readme-blocks/header-block.svg" alt="header" />
    <img class="block" src="readme-blocks/whoami-block.svg" alt="whoami" />
    <img class="block" src="readme-blocks/interests-block.svg" alt="interests" />
    <img class="block" src="readme-blocks/stack-block.svg" alt="stack" />
    <img class="block" src="readme-blocks/featured-repos-block.svg" alt="featured repos" />
    <img class="block" src="readme-blocks/timeline-block.svg" alt="timeline" />
    <img class="block" src="readme-blocks/quote-block.svg" alt="quote" />
    <img class="block" src="readme-blocks/footer-block.svg" alt="footer" />
  </div>
</body>
</html>
